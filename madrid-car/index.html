    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark: #080808;
            --accent: #D9251C;
            --accent-light: #E84333;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --border: #2A2A2A;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--dark);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);

        }

        .nav-container {

            margin: 0 auto;
            padding: 1.2rem 2rem;

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--accent);
        }

        .nav-cta {
            background: var(--accent);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .nav-cta:hover {
            background: var(--accent-light);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* ===== HERO ===== */
        .hero {

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(8, 8, 8, 0.4);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 700px;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .hero-highlight {
            color: var(--accent);
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-light);
            transform: translateY(-2px);

        }

        .btn-secondary {
            background: transparent;

        }

        .btn-secondary:hover {
            background: var(--text-primary);
            color: var(--dark);
            transform: translateY(-2px);
        }

        .stats-bar {
            background: linear-gradient(90deg, rgba(217, 37, 28, 0.1) 0%, rgba(217, 37, 28, 0.05) 100%);

            border-bottom: 1px solid var(--border);

        .stats-container {

            margin: 0 auto;

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);

        }

        .stat-label {
            color: var(--text-secondary);

        }

        .services {
            max-width: 1200px;

        .section-title {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            text-align: center;
            margin-bottom: 0.5rem;

        .section-subtitle {

            margin-bottom: 3rem;

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 5rem;
        }

        .service-card {
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.08) 0%, rgba(217, 37, 28, 0.03) 100%);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.15) 0%, rgba(217, 37, 28, 0.08) 100%);
            transform: translateY(-8px);
        }

        .service-icon {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .service-card h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .service-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* ===== SECCIÓN NOSOTROS ===== */
        .about {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-content h2 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .about-content p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .about-image {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .about-image img {
            width: 100%;
            display: block;
        }

        .about-features {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .feature-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .feature-check {
            color: var(--accent);
            font-size: 1.5rem;
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        /* ===== RESEÑAS ===== */
        .reviews {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
        }

        .review-rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .stars {
            font-size: 1.5rem;
            color: #FFB800;
        }

        .rating-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background: rgba(217, 37, 28, 0.05);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 12px;
        }

        .review-stars {
            color: #FFB800;
            margin-bottom: 1rem;
        }

        .review-text {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .review-author {
            font-weight: 600;
        }

        /* ===== FAQ ===== */
        .faq {
            max-width: 900px;
            margin: 5rem auto;
            padding: 0 2rem;
        }

        .faq-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .faq-item {
            background: rgba(217, 37, 28, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .faq-question {
            padding: 1.5rem;
            background: linear-gradient(90deg, rgba(217, 37, 28, 0.08) 0%, rgba(217, 37, 28, 0.03) 100%);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .faq-question:hover {
            background: rgba(217, 37, 28, 0.12);
        }

        .faq-toggle {
            color: var(--accent);
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-toggle {
            transform: rotate(180deg);
        }

        .faq-answer {
            padding: 1.5rem;
            color: var(--text-secondary);
            display: none;
            background: rgba(8, 8, 8, 0.5);
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        /* ===== CTA FINAL ===== */
        .final-cta {
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.2) 0%, rgba(217, 37, 28, 0.1) 100%);
            border: 2px solid var(--accent);

            padding: 3rem 2rem;
            text-align: center;
            max-width: 900px;
            margin: 5rem auto;
        }

        .final-cta h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
