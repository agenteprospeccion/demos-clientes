<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midas MADRID - Taller de Coches y Motos en Gran Vía de Hortaleza</title>
    <meta name="description" content="Taller Midas en Madrid, Gran Vía de Hortaleza. Servicio profesional para coches y motos. Valoración 4.1/5 en Google. Llama ahora: 917 64 30 29">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #080808;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(217, 37, 28, 0.2);
        }

        .nav-brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #D9251C;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: #D9251C;
        }

        .nav-phone {
            background-color: #D9251C;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: background-color 0.3s ease;
        }

        .nav-phone:hover {
            background-color: #b01d15;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 0.5rem;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: #D9251C;
        }

        /* Hero Section */
        .hero {
            margin-top: 70px;
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.8) 0%, rgba(8, 8, 8, 0.9) 100%), url('https://picsum.photos/seed/MidasMAhero/1800/1000');
            background-size: cover;
            background-position: center;
            padding: 100px 2rem;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: #f0f0f0;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background-color: #D9251C;
            color: white;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: #b01d15;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(217, 37, 28, 0.3);
        }

        .btn-secondary {
            background-color: transparent;
            color: white;
            padding: 1rem 2.5rem;
            border: 2px solid white;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-secondary:hover {
            background-color: white;
            color: #D9251C;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats Section */
        .stats {
            background-color: #0f0f0f;
            padding: 4rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat-card {
            text-align: center;
            padding: 2rem;
            border: 1px solid rgba(217, 37, 28, 0.2);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #D9251C;
            background-color: rgba(217, 37, 28, 0.05);
        }

        .stat-number {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #D9251C;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1rem;
            color: #b0b0b0;
        }

        /* Section Styles */
        section {
            padding: 5rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        section h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 3rem;
            text-align: center;
            color: white;
        }

        /* Services Section */
        .services {
            background-color: #080808;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background-color: #0f0f0f;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
            transition: all 0.3s ease;
            text-align: center;
        }

        .service-card:hover {
            border-color: #D9251C;
            background-color: rgba(217, 37, 28, 0.05);
            transform: translateY(-5px);
        }

        .service-icon {
            width: 60px;
            height: 60px;
            background-color: #D9251C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
        }

        .service-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: white;
        }

        .service-card p {
            color: #b0b0b0;
            line-height: 1.6;
        }

        /* About Section */
        .about {
            background-color: #0f0f0f;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-text h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            color: #D9251C;
            margin-bottom: 1rem;
        }

        .about-text p {
            color: #b0b0b0;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .about-image {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid rgba(217, 37, 28, 0.2);
        }

        .about-features {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .feature-item {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .feature-check {
            color: #D9251C;
            font-weight: 700;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        /* Reviews Section */
        .reviews {
            background-color: #080808;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background-color: #0f0f0f;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
        }

        .review-stars {
            color: #D9251C;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .review-text {
            color: #b0b0b0;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            font-style: italic;
        }

        .review-author {
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .google-badge {
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: rgba(217, 37, 28, 0.1);
            padding: 2rem;
            border-radius: 12px;
            margin-top: 2rem;
            border: 1px solid rgba(217, 37, 28, 0.2);
        }

        .google-badge-number {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            color: #D9251C;
            font-weight: 700;
        }

        .google-badge-text p {
            color: #b0b0b0;
            margin: 0;
        }

        /* FAQ Section */
        .faq {
            background-color: #0f0f0f;
        }

        .faq-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .faq-item {
            border: 1px solid rgba(217, 37, 28, 0.1);
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .faq-question {
            background-color: #080808;
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            user-select: none;
        }

        .faq-question:hover {
            background-color: rgba(217, 37, 28, 0.1);
        }

        .faq-question h4 {
            font-family: 'Syne', sans-serif;
            color: white;
            font-size: 1.1rem;
        }

        .faq-toggle {
            color: #D9251C;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .faq-answer {
            display: none;
            background-color: rgba(217, 37, 28, 0.05);
            padding: 1.5rem;
            color: #b0b0b0;
            line-height: 1.6;
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        .faq-item.active .faq-toggle {
            transform: rotate(45deg);
        }

        /* Contact Section */
        .contact {
            background-color: #080808;
            text-align: center;
        }

        .contact h2 {
            margin-bottom: 2rem;
        }

        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .contact-card {
            background-color: #0f0f0f;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
        }

        .contact-card h3 {
            color: #D9251C;
            margin-bottom: 1rem;
            font-family: 'Syne', sans-serif;
        }

        .contact-card p {
            color: #b0b0b0;
            margin-bottom: 0.5rem;
        }

        .contact-card a {
            color: #D9251C;
            text-decoration: none;
            font-weight: 700;
        }

        .contact-card a:hover {
            text-decoration: underline;
        }
