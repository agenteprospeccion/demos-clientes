<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="theme-color" content="#080808">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #080808;
            color: #f0f0f0;

        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* NAVEGACIÓN */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid rgba(217, 37, 28, 0.2);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 20px;
            height: 70px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #D9251C;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background-color: #D9251C;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #080808;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #D9251C;
        }

        .cta-button {
            background-color: #D9251C;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            background-color: #b81f17;
            transform: translateY(-2px);
        }

        .mobile-menu {
            display: none;
            background: none;
            border: none;
            color: #f0f0f0;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* HERO */
        .hero {
            margin-top: 70px;
            min-height: 600px;
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.2) 0%, rgba(8, 8, 8, 0.7) 100%), url('https://picsum.photos/seed/Tallereshero/1800/1000') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(217, 37, 28, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            animation: fadeInUp 1s ease-out;
        }

        .hero h1 {
            font-size: clamp(2rem, 6vw, 4rem);
            margin-bottom: 1.5rem;
            color: #fff;
            letter-spacing: -1px;
        }

        .hero h1 .accent {
            color: #D9251C;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            color: #d0d0d0;
            font-weight: 500;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-secondary {
            border: 2px solid #D9251C;
            background-color: transparent;
            color: #D9251C;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-secondary:hover {
            background-color: #D9251C;
            color: #fff;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* BARRA DE ESTADÍSTICAS */
        .stats {
            background-color: #1a1a1a;
            padding: 3rem 20px;
            border-top: 1px solid rgba(217, 37, 28, 0.2);
            border-bottom: 1px solid rgba(217, 37, 28, 0.2);
        }

        .stats .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .stat-item h3 {
            font-size: 2.5rem;
            color: #D9251C;
            margin-bottom: 0.5rem;
        }

        .stat-item p {
            color: #a0a0a0;
            font-weight: 500;
        }

        /* SERVICIOS */
        .services {
            padding: 5rem 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 1rem;
        }

        .section-header h2 .accent {
            color: #D9251C;
        }

        .section-header p {
            font-size: 1.1rem;
            color: #a0a0a0;
            max-width: 600px;
            margin: 0 auto;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background-color: #1a1a1a;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .service-card:hover {
            border-color: #D9251C;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(217, 37, 28, 0.15);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .service-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .service-card p {
            color: #a0a0a0;
            line-height: 1.8;
        }

        /* NOSOTROS */
        .about {
            padding: 5rem 20px;
            background-color: #0f0f0f;
        }

        .about .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-image {
            border-radius: 12px;
            overflow: hidden;
            height: 400px;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-content h2 {
            font-size: clamp(2rem, 5vw, 2.5rem);
            margin-bottom: 1.5rem;
        }

        .about-content h2 .accent {
            color: #D9251C;
        }

        .about-content p {
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            line-height: 1.9;
        }

        .about-list {
            list-style: none;
            margin-bottom: 2rem;
        }

        .about-list li {
            padding: 0.5rem 0;
            color: #d0d0d0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .about-list li::before {
            content: '✓';
            color: #D9251C;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* RESEÑAS */
        .reviews {
            padding: 5rem 20px;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
        }

        .review-stars {
            color: #D9251C;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .review-text {
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        .review-author {
            font-weight: 600;
            color: #f0f0f0;
        }

        .review-role {
            color: #808080;
            font-size: 0.9rem;
        }

        /* FAQ */
        .faq {
            padding: 5rem 20px;
            background-color: #0f0f0f;
        }

        .faq .container {
            max-width: 800px;
        }

        .faq-item {
            margin-bottom: 1.5rem;
            border: 1px solid rgba(217, 37, 28, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .faq-question {
            background-color: #1a1a1a;
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #f0f0f0;
        }

        .faq-question:hover {
            background-color: #222;
            color: #D9251C;
        }

        .faq-toggle {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-toggle {
            transform: rotate(180deg);
        }

        .faq-answer {
            display: none;
            background-color: #1a1a1a;
            padding: 0 1.5rem 1.5rem 1.5rem;
            color: #a0a0a0;
            line-height: 1.8;
        }

        .faq-item.active .faq-answer {
            display: block;
        }

        /* CTA FINAL */
        .final-cta {
            padding: 4rem 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.1) 0%, rgba(217, 37, 28, 0.05) 100%);
            border-top: 1px solid rgba(217, 37, 28, 0.2);
            border-bottom: 1px solid rgba(217, 37, 28, 0.2);
        }

        .final-cta h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 1.5rem;
        }

        .final-cta p {
            font-size: 1.1rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
        }

        /* FOOTER */
        footer {
            background-color: #0a0a0a;
            padding: 3rem 20px;
            border-top: 1px solid rgba(217, 37, 28, 0.2);
        }

        footer .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h3 {
            margin-bottom: 1.5rem;
            color: #D9251C;
        }

        .footer-section p, .footer-section a {
            color: #a0a0a0;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-section a:hover {
            color: #D9251C;
        }
