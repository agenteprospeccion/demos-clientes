<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Talleres J. Ramírez - Taller mecánico profesional en Madrid. Mantenimiento, reparación y servicios automotrices. Valoración 4.9/5. Llama al 917 42 50 49">

    <title>Talleres J. Ramírez | Taller Mecánico Profesional en Madrid</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #D9251C;
            --dark: #080808;
            --gray-light: #f5f5f5;
            --gray-dark: #1a1a1a;
            --text: #ffffff;
        }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #ff4444;
        }

        /* NAVBAR */
        nav {
            background: var(--dark);
            border-bottom: 1px solid var(--gray-dark);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 999;
            backdrop-filter: blur(10px);
        }

        nav.scrolled {
            box-shadow: 0 4px 20px rgba(217, 37, 28, 0.1);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-cta {
            background: var(--primary);
            color: var(--text);
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .nav-cta:hover {
            background: #ff4444;
            color: var(--text);
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.15) 0%, rgba(26, 26, 26, 0.85) 100%), 
                        url('https://picsum.photos/seed/Tallereshero/1800/1000') center/cover;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text);
            margin-top: 5rem;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-content h1 span {
            color: var(--primary);
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            color: #ccc;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary);
            color: var(--text);
            padding: 1rem 2rem;
            border-radius: 4px;
            font-weight: 600;
            margin-right: 1rem;
            transition: all 0.3s;
            border: 2px solid var(--primary);
        }

        .cta-button:hover {
            background: transparent;
            color: var(--primary);
        }

        .cta-button-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--text);
        }

        .cta-button-secondary:hover {
            background: var(--text);
            color: var(--dark);
            border-color: var(--text);
        }

        /* STATS */
        .stats {
            background: linear-gradient(135deg, var(--gray-dark) 0%, #2a2a2a 100%);
            padding: 4rem 2rem;
        }

        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 3rem;
            text-align: center;
        }

        .stat-item h3 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-item p {
            color: #aaa;
            font-weight: 500;
        }

        /* SECTION */
        section {
            max-width: 1200px;
            margin: 5rem auto;
            padding: 0 2rem;
        }

        .section-title {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .section-subtitle {
            text-align: center;
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        /* SERVICES */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .service-card {
            background: var(--gray-dark);
            padding: 2rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(217, 37, 28, 0.15);
        }

        .service-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .service-card p {
            color: #bbb;
            line-height: 1.8;
        }

        .service-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        /* ABOUT */
        .about-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-image {
            border-radius: 8px;
            overflow: hidden;
            height: 400px;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-content h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .about-content p {
            color: #ccc;
            margin-bottom: 1rem;
            line-height: 1.8;
        }

        .features-list {
            list-style: none;
            margin-top: 1.5rem;
        }

        .features-list li {
            padding: 0.8rem 0;
            color: #bbb;
            border-bottom: 1px solid var(--gray-dark);
        }

        .features-list li:before {
            content: "✓ ";
            color: var(--primary);
            font-weight: bold;
            margin-right: 0.5rem;
        }

        /* REVIEWS */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background: var(--gray-dark);
            padding: 2rem;
            border-radius: 8px;
            border-top: 3px solid var(--primary);
        }

        .stars {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .review-card p {
            color: #bbb;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .review-author {
            color: var(--primary);
            font-weight: 600;
        }

        /* FAQ */
        .faq-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .faq-item {
            background: var(--gray-dark);
            margin-bottom: 1rem;
            border-radius: 8px;
            overflow: hidden;
        }

        .faq-question {
            padding: 1.5rem;
            background: var(--gray-dark);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            transition: background 0.3s;
            border-left: 4px solid var(--primary);
        }

        .faq-question:hover {
            background: #252525;
        }

        .faq-toggle {
            color: var(--primary);
            font-weight: 800;
            transition: transform 0.3s;
        }

        .faq-item.active .faq-toggle {
            transform: rotate(45deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
        }

        .faq-answer p {
            padding: 0 1.5rem 1.5rem 1.5rem;
            color: #bbb;
        }

        /* CTA FINAL */
        .cta-final {
            background: linear-gradient(135deg, var(--primary) 0%, #a01a13 100%);
            padding: 4rem 2rem;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 4rem;
        }

        .cta-final h2 {
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }

        .cta-final p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .cta-final .cta-button {
            background: var(--text);
            color: var(--primary);
        }

        .cta-final .cta-button:hover {
            background: transparent;
            color: var(--text);
            border-color: var(--text);
        }

        /* FOOTER */
        footer {
            background: #000;
            border-top: 1px solid var(--gray-dark);
            padding: 3rem 2rem;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer-section h3 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .footer-section p, .footer-section a {
            color: #aaa;
            margin-bottom: 0.5rem;
            display: block;
        }

        .footer-section a:hover {
            color: var(--primary);
        }

        .contact-info {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .contact-info span {
            color: var(--primary);
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid var(--gray-dark);
            padding-top: 2rem;
            color: #666;
        }

        /* BANNER FLOTANTE */
        .banner-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 26, 0.95);
            border-top: 2px solid var(--primary);
            padding: 1rem 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            z-index: 998;
            backdrop-filter: blur(10px);
        }

        .banner-bottom span {
            color: var(--primary);
            font-weight: 600;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .menu-toggle {
                display: block;
            }
