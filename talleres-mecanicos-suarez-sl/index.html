        /* NAVBAR */
        nav {

            background-color: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;

            transition: width 0.3s ease;

        @media (max-width: 768px) {
