
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tucarbox - Soluciones de embalaje y cajas personalizadas en Alcalá de Henares, Madrid. Valoración 4.9/5">
    <meta name="keywords" content="cajas personalizadas, embalaje, Alcalá de Henares, Madrid">
    <meta name="theme-color" content="#D9251C">
    <title>Tucarbox - Cajas Personalizadas Alcalá de Henares</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #080808;
            color: #e0e0e0;
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        a {
            color: #D9251C;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #ff3d31;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(8, 8, 8, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(217, 37, 28, 0.1);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #D9251C;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #e0e0e0;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #D9251C;
            transition: width 0.3s ease;
        }

        .nav-links a:hover:before {
            width: 100%;
        }

        .cta-button {
            background-color: #D9251C;
            color: #fff !important;
            padding: 0.7rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: #ff3d31;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(217, 37, 28, 0.3);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background-color: #D9251C;
            margin: 5px 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* HERO */
        .hero {
            margin-top: 60px;
            height: 600px;
            background: linear-gradient(135deg, rgba(217, 37, 28, 0.2) 0%, rgba(8, 8, 8, 0.8) 100%), 
                        url('https://picsum.photos/seed/Tucarboxhero/1800/1000') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(8, 8, 8, 0.3) 0%, rgba(8, 8, 8, 0.8) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero .highlight {
            color: #D9251C;
        }

        .hero p {
            font-size: 1.2rem;
            color: #d0d0d0;
            margin-bottom: 2rem;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.5);
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background-color: #D9251C;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #ff3d31;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(217, 37, 28, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            color: #fff;
            border: 2px solid #D9251C;
        }

        .btn-secondary:hover {
            background-color: #D9251C;
            transform: translateY(-3px);
        }

        /* STATS BAR */
        .stats-bar {
            background: linear-gradient(90deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            border-top: 1px solid rgba(217, 37, 28, 0.2);
            border-bottom: 1px solid rgba(217, 37, 28, 0.2);
        }

        .stat-item {
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #D9251C;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section {
            padding: 5rem 2rem;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3rem);
            text-align: center;
            margin-bottom: 3rem;
            color: #fff;
            position: relative;
            padding-bottom: 1rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: #D9251C;
            border-radius: 2px;
        }

        /* SERVICES */
        .services {
            background-color: #0f0f0f;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .service-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(217, 37, 28, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .service-card:hover::before {
            left: 100%;
        }

        .service-card:hover {
            transform: translateY(-10px);
            border-color: rgba(217, 37, 28, 0.5);
            box-shadow: 0 20px 40px rgba(217, 37, 28, 0.1);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .service-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #fff;
        }

        .service-card p {
            color: #a0a0a0;
            font-size: 0.95rem;
        }

        /* ABOUT */
        .about {
            background-color: #080808;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-image {
            border-radius: 12px;
            overflow: hidden;
            height: 400px;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .about-image:hover img {
            transform: scale(1.05);
        }

        .about-text h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
        }

        .about-text p {
            margin-bottom: 1rem;
            color: #c0c0c0;
            line-height: 1.8;
        }

        .about-list {
            list-style: none;
            margin: 2rem 0;
        }

        .about-list li {
            padding: 0.5rem 0;
            color: #a0a0a0;
            position: relative;
            padding-left: 2rem;
        }

        .about-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #D9251C;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* REVIEWS */
        .reviews {
            background-color: #0f0f0f;
        }

        .reviews-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .review-rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stars {
            font-size: 2rem;
            color: #D9251C;
        }

        .rating-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .review-count {
            font-size: 0.95rem;
            color: #a0a0a0;
        }

        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .review-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #151515 100%);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(217, 37, 28, 0.1);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            transform: translateY(-8px);
            border-color: rgba(217, 37, 28, 0.3);
            box-shadow: 0 15px 35px rgba(217, 37, 28, 0.15);
        }

        .review-stars {
            color: #D9251C;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .review-text {
            color: #d0d0d0;
            font-style: italic;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        .review-author {
            font-weight: 600;
            color: #fff;
            font-size: 0.95rem;
        }
